        <script>
            
            window.onload = function() {
                let clickShip = (cropID) => {    
                let item = document.getElementById(cropID);
                if (item.style.opacity === '1') {
                    document.getElementById(cropID).style.opacity = '.2';

                else {
                    document.getElementById(cropID).style.opacity = '1';
