<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio A/B Compare — Quang Tran</title>
    <link rel="icon" href="/assets/images/icons/favicon-me.ico" sizes="any" />
    <style>
        :root { --accent: #ea4d2d; --bg: #181d29; --panel: #212737; --text: #eaedf3; }
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 0.6rem 1rem;
            background: var(--panel);
            border-bottom: 1px solid #2e3650;
        }
        .bar h1 { font-size: 1rem; margin: 0; font-weight: 700; }
        .bar .spacer { flex: 1; }
        .seg { display: inline-flex; border: 1px solid var(--accent); border-radius: 8px; overflow: hidden; }
        .seg button {
            background: transparent;
            color: var(--accent);
            border: 0;
            padding: 0.4rem 0.9rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .seg button.active { background: var(--accent); color: #fff; }
        .hint { color: #9aa3b8; font-size: 0.8rem; }
        .panes {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #2e3650;
            min-height: 0;
        }
        .pane { display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        .pane-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 600;
            background: var(--panel);
        }
        .pane-head a { color: var(--accent); text-decoration: none; font-size: 0.8rem; }
        .pane-head a:hover { text-decoration: underline; }
        .frame-wrap {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            background: #0e1117;
            min-height: 0;
        }
        iframe {
            border: 0;
            width: 100%;
            height: 100%;
            background: #fff;
        }
        /* Mobile-width simulation */
        body.mobile .frame-wrap iframe { width: 390px; flex: none; }
        body.mobile .frame-wrap { padding: 0.75rem 0; }

        @media (max-width: 800px) {
            .panes { grid-template-columns: 1fr; grid-auto-rows: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bar">
        <h1>Portfolio A/B Compare</h1>
        <span class="hint">Current site vs. redesign (v2)</span>
        <div class="spacer"></div>
        <span class="hint">Preview width:</span>
        <div class="seg" role="group" aria-label="Preview width">
            <button id="btn-desktop" class="active" type="button">Desktop</button>
            <button id="btn-mobile" type="button">Mobile</button>
        </div>
    </div>
    <div class="panes">
        <div class="pane">
            <div class="pane-head">
                <span>Current — /</span>
                <a href="/" target="_blank" rel="noopener">Open ↗</a>
            </div>
            <div class="frame-wrap">
                <iframe src="/" title="Current portfolio" loading="lazy"></iframe>
            </div>
        </div>
        <div class="pane">
            <div class="pane-head">
                <span>Redesign — /v2/</span>
                <a href="/v2/" target="_blank" rel="noopener">Open ↗</a>
            </div>
            <div class="frame-wrap">
                <iframe src="/v2/" title="Redesigned portfolio" loading="lazy"></iframe>
            </div>
        </div>
    </div>
    <script>
        const btnD = document.getElementById('btn-desktop');
        const btnM = document.getElementById('btn-mobile');
        btnD.addEventListener('click', () => {
            document.body.classList.remove('mobile');
            btnD.classList.add('active'); btnM.classList.remove('active');
        });
        btnM.addEventListener('click', () => {
            document.body.classList.add('mobile');
            btnM.classList.add('active'); btnD.classList.remove('active');
        });
    </script>
</body>
</html>
