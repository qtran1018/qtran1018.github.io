<!DOCTYPE html>

        <link rel="stylesheet" href="/css/bootstrap.css">

        <link rel="shortcut icon" type="image/xicon" href="/images/favicon.ico">
        <!-- <script src="/js/bootstrap.min.js"></script> -->
                    
        <script>
            let clickShip = (cropID) => {    
                let item = document.getElementById(cropID);
                if (item.style.opacity === '1') {
                    document.getElementById(cropID).style.opacity = '.2';
                }
                else {
                    document.getElementById(cropID).style.opacity = '1';           
                }           
            }                
        </script>

    </head>

    <body>
        
        <header class="container">
            <div class="row text-center">
                <h1 class="col-sm-4">Stardew Valley</h1>
                <nav class="col-sm-8 text-left">
                    <p><a href="https://github.com/qtran1018/qtran1018.github.io" target="_blank" title="My Github" alt="Link to my Github page."><img src="images/GitHub-Mark-32px.png"/></a></p>
                        
                    <p><a href="https://www.reddit.com/r/StardewValley/" target="_blank" title="Stardew Valley Subreddit" alt="Link to the Stardew Valley Subreddit"><img src="images/Smicon_reddit.png" width="32px"/> </a></p>
                </nav>
            </div>
        </header>
        
        <section class="jumbotron">
            <h1>Stardew Shipped Items Tracker</h1>
            <div class="row text-center">
                <div class="col-sm-6">
                    <img class="itemImage" id="Wild Horseradish" src="images/StardewShipped/Wild_Horseradish.png" title="Wild Horseradish" onclick="clickShip('Wild Horseradish')"/>
                    
                    
                    
                    <img class="itemImage" id="Amaranth" src="images/StardewShipped/Amaranth.png" title="Amaranth" onclick="clickShip('Amaranth')"/>
                    <img class="itemImage" id="Ancient Fruit" src="images/StardewShipped/Ancient_Fruit.png" title="Ancient Fruit" onclick="clickShip('Ancient Fruit')"/>
                    <img class="itemImage" id="Apple" src="images/StardewShipped/Apple.png" title="Apple" onclick="clickShip('Apple')"/>
                </div>
                <div class="col-sm-6">
                    <p>Ligma</p>
                </div>
            </div>
        </section>
        
        
    </body>
